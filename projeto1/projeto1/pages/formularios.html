<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>

    <style>
        label{
            font-family: Arial, Helvetica, sans-serif;
            font-size: 20px;
            color:rgb(40, 79, 185);
            display: block;
            margin: 10px 0;
        }

        input,textarea{
            padding: 5px;
            font-family: Arial, Helvetica, sans-serif;
        }

        input[type="submit"]{
            background-color: rgb(40, 79, 185);
            color: #fff;
            border: none;
            margin-top: 10px;
            cursor: pointer;
        }

        input[type="submit"]:hover{
            background: #f00;
        }



    </style>


</head>

<body>

    <h1>Formulários em HTML</h1>

    <form name="contato" method="post" action="contato.php">
        <fieldset>
            <legend>Formulário  de contato</legend>
        <div>
            <label for="name">Nome:</label>
            <input type="text" id="name" placeholder="Digite seu nome:" required />
        </div>

        <div>
            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="Digite seu nome:" required="true"/>
        </div>

        <div>
            <label for="msn">Mensagem</label>
            <textarea rows="5" id="msn" placeholder="Sua mensagem aqui" required></textarea>
        </div>

        <div>
            <input type="submit" value="Enviar contato"/>
        </div>

    </fieldset>

    </form>





</body>

</html>
